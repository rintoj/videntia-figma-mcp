<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Claude Figma MCP</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 12px;
        color: #e0e0e0;
        background-color: #1e1e1e;
      }
      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 10px;
        color: #ffffff;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin-top: 12px;
        margin-bottom: 6px;
        color: #ffffff;
      }
      button {
        background-color: #18a0fb;
        border: none;
        color: white;
        padding: 8px 12px;
        border-radius: 4px;
        margin: 0;
        cursor: pointer;
        font-size: 14px;
        white-space: nowrap;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #0d8ee0;
      }
      button.secondary {
        background-color: #3d3d3d;
        color: #e0e0e0;
      }
      button.secondary:hover {
        background-color: #4d4d4d;
      }
      button.danger {
        background-color: #c53030;
        color: #ffffff;
      }
      button.danger:hover {
        background-color: #e53e3e;
      }
      button:disabled {
        background-color: #333333;
        color: #666666;
        cursor: not-allowed;
      }
      input {
        border: 1px solid #444444;
        border-radius: 4px;
        padding: 8px;
        margin-bottom: 0;
        font-size: 14px;
        flex: 1;
        min-width: 0;
        box-sizing: border-box;
        background-color: #2d2d2d;
        color: #e0e0e0;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        font-weight: 500;
        color: #cccccc;
      }
      .status {
        margin-top: 4px;
        padding: 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      .status.connected {
        background-color: #1a472a;
        color: #4ade80;
      }
      .status.disconnected {
        background-color: #471a1a;
        color: #ff9999;
      }
      .status.info {
        background-color: #1a3147;
        color: #66b3ff;
      }
      .section {
        margin-top: 8px;
        margin-bottom: 6px;
      }
      .hidden {
        display: none;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      .header h1 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
      }
      .tabs {
        display: flex;
        border-bottom: 1px solid #444444;
        margin-bottom: 16px;
      }
      .tab {
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        color: #999999;
      }
      .tab.active {
        border-bottom: 2px solid #18a0fb;
        color: #18a0fb;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .link {
        color: #18a0fb;
        text-decoration: none;
        cursor: pointer;
      }
      .link:hover {
        text-decoration: underline;
      }
      .header-logo {
        height: 24px;
        width: 24px;
        min-width: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        background-color: #333;
      }
      .header-logo-image {
        width: 100%;
      }
      /* Operation status bar */
      .operation-status {
        margin-top: auto;
        padding: 0;
        border-radius: 4px;
        font-size: 11px;
        color: #cccccc;
        transition: opacity 0.3s;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .operation-status.success {
        color: #4ade80;
      }
      .operation-status.error {
        color: #ff9999;
      }
      .operation-status.running {
        color: #66b3ff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="section">
        <div style="display: flex; align-items: center; gap: 8px">
          <input
            type="number"
            id="port"
            placeholder="3055"
            value="3055"
            min="1024"
            max="65535"
          />
          <button id="btn-connect" class="primary">Connect</button>
        </div>
      </div>

      <div id="connection-status" class="status disconnected">
        Disconnected
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px; padding: 6px 8px; background-color: #2d2d2d; border-radius: 4px;">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 11px; color: #999;">Read Only</span>
          <label style="position: relative; display: inline-block; width: 32px; height: 18px; margin: 0;">
            <input type="checkbox" id="readonly-toggle" style="opacity: 0; width: 0; height: 0;">
            <span id="readonly-slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; border-radius: 18px; transition: background-color 0.2s;">
              <span id="readonly-knob" style="position: absolute; content: ''; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: #ccc; border-radius: 50%; transition: transform 0.2s;"></span>
            </span>
          </label>
        </div>
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <span style="font-size: 11px; color: #999;">Auto Focus</span>
          <label style="position: relative; display: inline-block; width: 32px; height: 18px; margin: 0;">
            <input type="checkbox" id="autofocus-toggle" style="opacity: 0; width: 0; height: 0;">
            <span id="autofocus-slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; border-radius: 18px; transition: background-color 0.2s;">
              <span id="autofocus-knob" style="position: absolute; content: ''; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: #ccc; border-radius: 50%; transition: transform 0.2s;"></span>
            </span>
          </label>
        </div>
      </div>

      <div id="operation-status" class="operation-status hidden"></div>
    </div>

    <script>
      // WebSocket connection state
      const state = {
        connected: false,
        socket: null,
        serverPort: 3055,
        pendingRequests: new Map(),
        channel: null,
        fileName: null,
        intentionalDisconnect: false,
        reconnectTimer: null,
        reconnectAttempt: 0,
      };

      const RECONNECT_BASE_DELAY = 1000;
      const RECONNECT_MAX_DELAY = 30000;

      // Allowlist of every command the plugin handler recognises.
      // Commands not in this set are rejected before reaching plugin code.
      const ALLOWED_COMMANDS = new Set([
        "get_document_info","get_file_key","get_selection","get_node_info","get_nodes_info","search_nodes",
        "create_rectangle","create_frame","create_text","set_fill_color","set_stroke_color",
        "set_image_fill","set_gradient_fill","move_node","resize_node","delete_node",
        "delete_multiple_nodes","clone_node","rename_node","insert_child","group_nodes",
        "ungroup_nodes","flatten_node","export_node_as_image","set_corner_radius",
        "get_styles","get_local_components","get_remote_components","create_component_instance",
        "detach_instance","create_component","create_component_set","add_component_property",
        "edit_component_property","delete_component_property","set_component_property_references",
        "get_component_properties","set_text_content","set_multiple_text_contents",
        "set_auto_layout","set_font_name","set_font_size","set_font_weight","set_letter_spacing",
        "set_line_height","set_paragraph_spacing","set_text_case","set_text_decoration",
        "get_styled_text_segments","load_font_async","create_text_style","create_text_style_from_properties",
        "apply_text_style","get_text_styles","delete_text_style","update_text_style",
        "set_effects","set_effect_style_id","create_effect_style","update_effect_style",
        "delete_effect_style","create_ellipse","create_polygon","create_star","create_svg",
        "update_icon","create_vector","create_line","get_variables","get_bound_variables",
        "bind_variable","unbind_variable","get_variable_collections","create_variable_collection",
        "get_collection_info","rename_variable_collection","delete_variable_collection",
        "create_variable","create_variables_batch","update_variable_value","rename_variable",
        "delete_variable","delete_variables_batch","audit_collection","validate_color_contrast",
        "suggest_missing_variables","apply_default_theme","create_color_scale_set",
        "apply_custom_palette","reorder_variables","generate_audit_report","export_collection_schema",
        "import_collection_schema","create_all_scales","fix_collection_to_standard","add_chart_colors",
        "add_mode_to_collection","rename_mode","delete_mode","duplicate_mode_values",
        "create_spacing_system","create_typography_system","create_radius_system","set_layout_mode",
        "set_padding","set_item_spacing","set_axis_align","set_layout_sizing","set_focus",
        "set_selections","scan_nodes_by_types","get_annotations","set_annotation",
        "set_multiple_annotations","get_annotation_categories","create_annotation_category",
        "update_annotation_category","delete_annotation_category","get_reactions",
        "set_default_connector","create_connections","create_page","rename_page","delete_page",
        "create_from_data","get_design_system","setup_design_system","batch_actions","lint_frame",
        "get_instance_overrides","set_instance_overrides"
      ]);

      // Minimum time (ms) to display "Running: X..." before flipping to "completed".
      // Prevents fast commands from flashing too quickly to be readable.
      const MIN_PROGRESS_DISPLAY_MS = 600;
      // Per-command start times (keyed by command ID) to handle concurrent commands
      const progressStartTimes = new Map();

      // UI Elements
      const portInput = document.getElementById("port");
      const connectButton = document.getElementById("btn-connect");
      const connectionStatus = document.getElementById("connection-status");
      const readonlyToggle = document.getElementById("readonly-toggle");
      const readonlySlider = document.getElementById("readonly-slider");
      const readonlyKnob = document.getElementById("readonly-knob");

      function updateReadonlyUI(isOn) {
        readonlyToggle.checked = isOn;
        readonlySlider.style.backgroundColor = isOn ? "#c53030" : "#444";
        readonlyKnob.style.transform = isOn ? "translateX(14px)" : "translateX(0)";
      }

      readonlyToggle.addEventListener("change", function () {
        var isOn = readonlyToggle.checked;
        updateReadonlyUI(isOn);
        parent.postMessage({ pluginMessage: { type: "update-settings", readonlyMode: isOn } }, "*");
      });

      const autofocusToggle = document.getElementById("autofocus-toggle");
      const autofocusSlider = document.getElementById("autofocus-slider");
      const autofocusKnob = document.getElementById("autofocus-knob");

      function updateAutofocusUI(isOn) {
        autofocusToggle.checked = isOn;
        autofocusSlider.style.backgroundColor = isOn ? "#18a0fb" : "#444";
        autofocusKnob.style.transform = isOn ? "translateX(14px)" : "translateX(0)";
      }

      autofocusToggle.addEventListener("change", function () {
        var isOn = autofocusToggle.checked;
        updateAutofocusUI(isOn);
        parent.postMessage({ pluginMessage: { type: "update-settings", autoFocus: isOn } }, "*");
      });

      // Operation status bar
      const operationStatus = document.getElementById("operation-status");
      let operationHideTimer = null;

      // Initialize UI
      function updateConnectionStatus(isConnected, message) {
        state.connected = isConnected;
        connectionStatus.textContent =
          message ||
          (isConnected
            ? "Connected to Claude Figma MCP"
            : "Disconnected");
        connectionStatus.className = `status ${
          isConnected ? "connected" : "disconnected"
        }`;

        if (isConnected) {
          connectButton.textContent = "Disconnect";
          connectButton.className = "danger";
        } else {
          connectButton.textContent = "Connect";
          connectButton.className = "primary";
        }
        connectButton.disabled = false;
        portInput.disabled = isConnected;
      }

      // Copy text to clipboard
      function copyToClipboard(text) {
        try {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
        } catch (e) {
          console.error("Failed to copy to clipboard:", e);
        }
      }

      // Connect to WebSocket server
      async function connectToServer(port) {
        try {
          if (state.connected && state.socket) {
            updateConnectionStatus(true, "Already connected to server");
            return;
          }

          // Clean up any stale socket reference
          if (state.socket) {
            try { state.socket.close(); } catch (e) {}
            state.socket = null;
          }

          state.serverPort = port;
          state.socket = new WebSocket(`ws://localhost:${port}`);

          state.socket.onopen = () => {
            // Reset reconnect state on successful connection
            state.reconnectAttempt = 0;
            cancelReconnect();

            // Generate random channel name (only if we don't already have one)
            const channelName = state.channel || generateChannelName();
            console.log("Joining channel:", channelName);
            state.channel = channelName;

            // Join the channel with file name metadata
            // fileName is pre-fetched on plugin startup, so it should already be available
            const joinPayload = {
              type: "join",
              channel: channelName.trim(),
            };
            if (state.fileName) {
              joinPayload.fileName = state.fileName;
            }
            state.socket.send(JSON.stringify(joinPayload));

            // If file name wasn't available yet, request it (fallback)
            if (!state.fileName) {
              parent.postMessage(
                { pluginMessage: { type: "get-file-name" } },
                "*"
              );
            }
          };

          state.socket.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              console.log("Received message:", data);

              if (data.type === "system") {
                // Successfully joined channel
                if (data.message && data.message.result) {
                  state.connected = true;
                  const channelName = data.channel;

                  updateConnectionStatus(true, "Channel: " + channelName);

                  // Notify the plugin code
                  parent.postMessage(
                    {
                      pluginMessage: {
                        type: "notify",
                        message: `Channel: ${channelName}`,
                      },
                    },
                    "*"
                  );
                }
              } else if (data.type === "error") {
                console.error("Error:", data.message);
                updateConnectionStatus(false, "Error: " + String(data.message));
                state.socket.close();
              }

              handleSocketMessage(data);
            } catch (error) {
              console.error("Error parsing message:", error);
            }
          };

          state.socket.onclose = () => {
            const wasConnected = state.connected;
            state.connected = false;
            state.socket = null;

            if (state.intentionalDisconnect) {
              state.intentionalDisconnect = false;
              state.reconnectAttempt = 0;
              updateConnectionStatus(false, "Disconnected from server");
            } else {
              scheduleReconnect(wasConnected);
            }
          };

          state.socket.onerror = (error) => {
            console.error("WebSocket error:", error);
            // onclose will fire after onerror, so reconnect logic is handled there
          };
        } catch (error) {
          console.error("Connection error:", error);
          updateConnectionStatus(
            false,
            `Connection error: ${error.message || "Unknown error"}`
          );
        }
      }

      // Disconnect from websocket server
      function disconnectFromServer() {
        state.intentionalDisconnect = true;
        cancelReconnect();
        if (state.socket) {
          state.socket.close();
          state.socket = null;
          state.connected = false;
          updateConnectionStatus(false, "Disconnected from server");
        }
      }

      // Schedule a reconnection attempt with exponential backoff
      function scheduleReconnect(wasConnected) {
        cancelReconnect();
        const delay = Math.min(
          RECONNECT_BASE_DELAY * Math.pow(2, state.reconnectAttempt),
          RECONNECT_MAX_DELAY
        );
        const seconds = Math.round(delay / 1000);
        updateConnectionStatus(
          false,
          wasConnected
            ? `Connection lost. Reconnecting in ${seconds}s...`
            : `Connection failed. Retrying in ${seconds}s...`
        );
        connectionStatus.className = "status info";

        state.reconnectTimer = setTimeout(() => {
          state.reconnectAttempt++;
          console.log(`Reconnect attempt ${state.reconnectAttempt} (delay was ${delay}ms)`);
          updateConnectionStatus(false, "Reconnecting...");
          connectionStatus.className = "status info";
          connectButton.disabled = true;
          connectToServer(state.serverPort);
        }, delay);
      }

      // Cancel any pending reconnection
      function cancelReconnect() {
        if (state.reconnectTimer) {
          clearTimeout(state.reconnectTimer);
          state.reconnectTimer = null;
        }
      }

      // Handle messages from the WebSocket
      async function handleSocketMessage(payload) {
        const data = payload.message;
        console.log("handleSocketMessage", data);

        // If it's a response to a previous request
        if (data.id && state.pendingRequests.has(data.id)) {
          const { resolve, reject } = state.pendingRequests.get(data.id);
          state.pendingRequests.delete(data.id);

          if (data.error) {
            reject(new Error(data.error));
          } else {
            resolve(data.result);
          }
          return;
        }

        // If it's a new command
        if (data.command) {
          // Reject commands not in the allowlist — prevents a compromised or
          // spoofed localhost server from calling arbitrary plugin commands.
          if (!ALLOWED_COMMANDS.has(data.command)) {
            console.error("Blocked unknown command:", data.command);
            sendErrorResponse(data.id, "Command not permitted");
            return;
          }

          const name = formatCommandName(data.command);
          progressStartTimes.set(data.id, Date.now());
          showOperationStatus(`Running: ${name}...`, "running");
          try {
            // Send the command to the plugin code
            parent.postMessage(
              {
                pluginMessage: {
                  type: "execute-command",
                  id: data.id,
                  command: data.command,
                  params: data.params,
                },
              },
              "*"
            );
          } catch (error) {
            showOperationStatus(`${name} failed`, "error");
            hideOperationStatusAfter(5000);
            // Send error back to WebSocket
            sendErrorResponse(
              data.id,
              error.message || "Error executing command"
            );
          }
        }
      }

      // Send a command to the WebSocket server
      async function sendCommand(command, params) {
        return new Promise((resolve, reject) => {
          if (!state.connected || !state.socket) {
            reject(new Error("Not connected to server"));
            return;
          }

          const id = generateId();
          state.pendingRequests.set(id, { resolve, reject });

          state.socket.send(
            JSON.stringify({
              id,
              type: "message",
              channel: state.channel,
              message: {
                id,
                command,
                params,
              },
            })
          );

          // Set timeout to reject the promise after 30 seconds
          setTimeout(() => {
            if (state.pendingRequests.has(id)) {
              state.pendingRequests.delete(id);
              reject(new Error("Request timed out"));
            }
          }, 30000);
        });
      }

      // Send success response back to WebSocket
      function sendSuccessResponse(id, result) {
        if (!state.connected || !state.socket) {
          console.error("Cannot send response: socket not connected");
          return;
        }

        state.socket.send(
          JSON.stringify({
            id,
            type: "message",
            channel: state.channel,
            message: {
              id,
              result,
            },
          })
        );
      }

      // Send error response back to WebSocket
      function sendErrorResponse(id, errorMessage) {
        if (!state.connected || !state.socket) {
          console.error("Cannot send error response: socket not connected");
          return;
        }

        state.socket.send(
          JSON.stringify({
            id,
            type: "message",
            channel: state.channel,
            message: {
              id,
              error: errorMessage,
            },
          })
        );
      }

      // Helper to generate unique IDs (uses crypto for collision resistance)
      function generateId() {
        const bytes = new Uint8Array(6);
        crypto.getRandomValues(bytes);
        let hex = "";
        for (let i = 0; i < bytes.length; i++) {
          hex += bytes[i].toString(16).padStart(2, "0");
        }
        return Date.now().toString(36) + hex;
      }

      // Add this function after the generateId() function
      function generateChannelName() {
        const characters = "abcdefghijklmnopqrstuvwxyz0123456789";
        const randomBytes = new Uint8Array(8);
        crypto.getRandomValues(randomBytes);
        let result = "";
        for (let i = 0; i < 8; i++) {
          result += characters.charAt(randomBytes[i] % characters.length);
        }
        return result;
      }

      // Connect/Disconnect toggle
      connectButton.addEventListener("click", () => {
        if (state.connected) {
          updateConnectionStatus(false, "Disconnecting...");
          connectionStatus.className = "status info";
          disconnectFromServer();
        } else {
          cancelReconnect();
          state.reconnectAttempt = 0;
          const parsedPort = parseInt(portInput.value, 10);
          const port = (parsedPort >= 1024 && parsedPort <= 65535) ? parsedPort : 3055;
          updateConnectionStatus(false, "Connecting...");
          connectionStatus.className = "status info";
          connectButton.disabled = true;
          connectToServer(port);
        }
      });

      // Format command name for display
      function formatCommandName(command) {
        if (!command) return "";
        return command.replace(/_/g, " ").replace(/^\w/, c => c.toUpperCase());
      }

      // Show operation status
      function showOperationStatus(text, type) {
        if (operationHideTimer) {
          clearTimeout(operationHideTimer);
          operationHideTimer = null;
        }
        operationStatus.textContent = text;
        operationStatus.className = `operation-status ${type}`;
      }

      // Reset operation status to idle after delay
      function hideOperationStatusAfter(ms) {
        operationHideTimer = setTimeout(() => {
          operationStatus.textContent = "";
          operationStatus.className = "operation-status hidden";
        }, ms);
      }

      // Update operation status for progress events
      function updateProgressUI(progressData) {
        const name = formatCommandName(progressData.command || "");
        if (progressData.status === "completed") {
          showOperationStatus(progressData.message || `${name} completed`, "success");
          hideOperationStatusAfter(3000);
        } else if (progressData.status === "error") {
          showOperationStatus(progressData.message || `${name} failed`, "error");
          hideOperationStatusAfter(5000);
        } else {
          showOperationStatus(progressData.message || `${name}...`, "running");
        }
      }

      // Send operation progress update to server
      function sendProgressUpdateToServer(progressData) {
        if (!state.connected || !state.socket) {
          console.error("Cannot send progress update: socket not connected");
          return;
        }

        state.socket.send(
          JSON.stringify({
            id: progressData.commandId,
            type: "progress_update",
            channel: state.channel,
            message: {
              id: progressData.commandId,
              type: "progress_update",
              data: progressData
            }
          })
        );
      }

      // Listen for messages from the plugin code
      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;

        console.log("Received message from plugin:", message);

        switch (message.type) {
          case "connection-status":
            updateConnectionStatus(message.connected, message.message);
            break;
          case "init-settings":
            // Restore saved server port to the input field on plugin startup
            if (message.settings && message.settings.serverPort) {
              state.serverPort = message.settings.serverPort;
              portInput.value = message.settings.serverPort;
            }
            if (message.settings && message.settings.readonlyMode !== undefined) {
              updateReadonlyUI(message.settings.readonlyMode);
            }
            if (message.settings && message.settings.autoFocus !== undefined) {
              updateAutofocusUI(message.settings.autoFocus);
            }
            break;
          case "auto-connect":
            connectButton.click();
            break;
          case "auto-disconnect":
            disconnectFromServer();
            break;
          case "command-result": {
            // Ensure "Running: X..." is visible for at least MIN_PROGRESS_DISPLAY_MS
            const resultName = formatCommandName(message.command || "");
            const resultStart = progressStartTimes.get(message.id);
            const resultDelay = resultStart !== undefined
              ? Math.max(0, MIN_PROGRESS_DISPLAY_MS - (Date.now() - resultStart))
              : 0;
            progressStartTimes.delete(message.id);
            setTimeout(() => {
              showOperationStatus(`${resultName} completed`, "success");
              hideOperationStatusAfter(3000);
            }, resultDelay);
            // Forward the result from plugin code back to WebSocket (no delay needed)
            sendSuccessResponse(message.id, message.result);
            break;
          }
          case "command-error": {
            const errorName = formatCommandName(message.command || "");
            const errorStart = progressStartTimes.get(message.id);
            const errorDelay = errorStart !== undefined
              ? Math.max(0, MIN_PROGRESS_DISPLAY_MS - (Date.now() - errorStart))
              : 0;
            progressStartTimes.delete(message.id);
            setTimeout(() => {
              showOperationStatus(`${errorName} failed`, "error");
              hideOperationStatusAfter(5000);
            }, errorDelay);
            // Forward the error from plugin code back to WebSocket (no delay needed)
            sendErrorResponse(message.id, message.error);
            break;
          }
          case "file-name":
            state.fileName = message.fileName;
            console.log("File name received:", state.fileName);
            // Send updated metadata to server if socket is open
            if (state.socket && state.socket.readyState === WebSocket.OPEN && state.channel) {
              state.socket.send(
                JSON.stringify({
                  type: "join",
                  channel: state.channel,
                  fileName: state.fileName,
                })
              );
            }
            break;
          case "command_progress":
            // Update UI with progress information
            updateProgressUI(message);
            // Forward progress update to server
            sendProgressUpdateToServer(message);
            break;
        }
      };
    </script>
  </body>
</html>
